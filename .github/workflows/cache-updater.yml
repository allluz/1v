name: Cache Updater

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cache-updater.yml'
      - 'firebase_cache_updater.py'
      - 'scripts/rio_scraper.py'
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install firebase-admin requests

      - name: Decodificar service account key
        run: |
          mkdir -p .secrets
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > .secrets/serviceAccountKey.json

      - name: Rodar cache updater
        run: python firebase_cache_updater.py

      - name: Atualizar nível do Rio Iguaçu
        run: python scripts/rio_scraper.py
